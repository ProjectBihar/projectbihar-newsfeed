name: Scrape Bihar News
on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:           # Manual trigger button
concurrency:
  group: scrape
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run scraper
        id: scrape
        run: npx tsx src/scraper/index.ts
        env:
          # 🔥 FIXED: Names now match index.ts exactly
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Send failure email
        if: failure() || cancelled()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Scraper Failed — Run #${{ github.run_number }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Scraper run #${{ github.run_number }} failed or was cancelled (likely a timeout).
            Branch: ${{ github.ref_name }}
            Trigger: ${{ github.event.schedule || 'manual' }}
            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}